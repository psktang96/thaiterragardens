<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 272 70" width="272" height="70">

  <!-- Badge: dark green circle -->
  <circle cx="35" cy="35" r="33" fill="#1a3a2a"/>

  <!-- Thin gold accent ring -->
  <circle cx="35" cy="35" r="31.5" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>

  <!-- ===== PLUMERIA FLOWER ===== -->
  <!-- 5 petals, each rotated 72° around center (35,35) -->
  <!-- Petal shape: elongated oval, base at center, tip pointing up -->

  <path d="M35,35 C30,32 25,21 35,6 C45,21 40,32 35,35 Z"
        fill="#fffef5" stroke="#e8d8b0" stroke-width="0.7"
        transform="rotate(0,35,35)"/>
  <path d="M35,35 C30,32 25,21 35,6 C45,21 40,32 35,35 Z"
        fill="#fffef5" stroke="#e8d8b0" stroke-width="0.7"
        transform="rotate(72,35,35)"/>
  <path d="M35,35 C30,32 25,21 35,6 C45,21 40,32 35,35 Z"
        fill="#fffef5" stroke="#e8d8b0" stroke-width="0.7"
        transform="rotate(144,35,35)"/>
  <path d="M35,35 C30,32 25,21 35,6 C45,21 40,32 35,35 Z"
        fill="#fffef5" stroke="#e8d8b0" stroke-width="0.7"
        transform="rotate(216,35,35)"/>
  <path d="M35,35 C30,32 25,21 35,6 C45,21 40,32 35,35 Z"
        fill="#fffef5" stroke="#e8d8b0" stroke-width="0.7"
        transform="rotate(288,35,35)"/>

  <!-- Yellow-gold inner glow at petal bases -->
  <circle cx="35" cy="35" r="12" fill="#f5c840" opacity="0.18"/>

  <!-- Gold center — outer ring -->
  <circle cx="35" cy="35" r="9" fill="#c9a84c"/>
  <!-- Middle ring -->
  <circle cx="35" cy="35" r="6"  fill="#e8c97a"/>
  <!-- Inner highlight -->
  <circle cx="35" cy="35" r="3"  fill="#fff3c0"/>

  <!-- ===== TEXT ===== -->

  <!-- Brand name -->
  <text x="80" y="30"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="700"
    fill="#1a3a2a"
    letter-spacing="3">THAI TERRA</text>

  <!-- Gold separator line -->
  <line x1="80" y1="39.5" x2="268" y2="39.5" stroke="#c9a84c" stroke-width="1.2"/>

  <!-- Subtitle -->
  <text x="80" y="57"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10.5"
    fill="#2d6a4f"
    letter-spacing="7.5">GARDENS</text>

</svg>
